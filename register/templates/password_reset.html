

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
</head>
<body>
    <h1>Reset Password</h1>
    <form method="post">
        {% csrf_token %}
        {% if error %}
            <p style="color:red;">{{ error }}</p>
        {% endif %}
        {% if message %}
            <p style="color:green;">{{ message }}</p>
        {% endif %}

        <label for="email">Email Address:</label>
        <input type="email" name="email" value="{{ email }}" required><br>

        <label for="new_password">New Password:</label>
        <input type="password" name="new_password" value="{{ new_password }}" required><br>

        {% if not show_code_input %}
            <label>Use QQ Email to Send Verification Code:</label><br>
            <input type="radio" name="use_alternate_email" value="yes"> Yes<br>
            <input type="radio" name="use_alternate_email" value="no" checked> No<br>
        {% endif %}

        {% if show_code_input %}
            <label for="code">Enter Verification Code:</label>
            <input type="text" name="code" required><br>
            <button type="submit" name="reset_password">Reset Password</button>
        {% else %}
            <button type="submit" name="send_code">Send Verification Code</button>
        {% endif %}
    </form>
</body>
</html>
